name: CloudScan - Terraform Security Analysis

on:
  push:
    branches: [ main ]
    paths:
      - '**.tf'
  pull_request:
    branches: [ main ]
    paths:
      - '**.tf'

jobs:
  cloudscan-analysis:
    name: CloudScan ML Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff detection

      - name: Detect Changed Terraform Files
        id: detect_changes
        run: |
          echo "🔍 Detecting changed .tf files..."
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- '*.tf')
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '*.tf' 2>/dev/null || git ls-files '*.tf')
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "No .tf files changed. Skipping scan."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" > /tmp/changed_tf_files.txt
          fi

      - name: Package Terraform Files
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          echo "📦 Packaging Terraform files for analysis..."
          mkdir -p /tmp/tf_package
          # Copy all .tf files (entire infrastructure context needed for graph)
          find . -name "*.tf" -not -path "./.terraform/*" -exec cp {} /tmp/tf_package/ \;
          echo "Files packaged:"
          ls -la /tmp/tf_package/
          cd /tmp && zip -r terraform_scan.zip tf_package/
          echo "✅ Package created: terraform_scan.zip ($(du -h /tmp/terraform_scan.zip | cut -f1))"

      - name: Set up Python
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Clone CloudScan Backend
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          echo "📥 Cloning CloudScan inference backend..."
          git clone https://github.com/${{ github.repository_owner }}/CloudScan.git /tmp/cloudscan
          echo "✅ CloudScan backend cloned"

      - name: Install Backend Dependencies
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          echo "📦 Installing Python dependencies..."
          cd /tmp/cloudscan/inference
          pip install -r requirements.txt
          echo "✅ Dependencies installed"

      - name: Start CloudScan API Server
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          OPEN_ROUTER_KEY: ${{ secrets.OPEN_ROUTER_KEY }}
        run: |
          echo "🚀 Starting CloudScan API server..."
          cd /tmp/cloudscan/inference
          echo "OPEN_ROUTER_KEY=${OPEN_ROUTER_KEY}" > .env
          if [ -n "$OPEN_ROUTER_KEY" ]; then
            echo "✅ API key loaded from secrets"
          else
            echo "⚠️  No OPEN_ROUTER_KEY secret found"
          fi
          python api_server.py &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV

          # Wait for the server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/health | grep -q '"status":"ok"'; then
              echo "✅ API server is ready"
              break
            fi
            echo "  Waiting for API server... ($i/30)"
            sleep 2
          done

      - name: Run CloudScan Analysis (Graph + RGCN + LLM Remediation)
        if: steps.detect_changes.outputs.has_changes == 'true'
        id: cloudscan_analysis
        run: |
          echo "🔍 Sending Terraform files to CloudScan API for analysis..."
          echo "  → Building infrastructure graph"
          echo "  → Running RGCN risk classification"
          echo "  → Generating LLM remediation suggestions"
          echo ""

          # Build the curl command with all .tf files
          CURL_ARGS="-s -X POST"
          for tf_file in /tmp/tf_package/*.tf; do
            CURL_ARGS="$CURL_ARGS -F files=@$tf_file"
          done

          # Call the CloudScan /api/scan endpoint
          RESPONSE=$(curl $CURL_ARGS "http://localhost:5000/api/scan?threshold=1&remediation=true")

          # Save response for later steps
          echo "$RESPONSE" > /tmp/cloudscan_result.json
          echo "$RESPONSE" | python3 -m json.tool || echo "$RESPONSE"

          # Extract results
          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "❌ CloudScan API returned an error"
            ERROR=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('error','Unknown error'))")
            echo "Error: $ERROR"
            exit 1
          fi

          echo ""
          echo "✅ CloudScan analysis complete"

      - name: Post Results Summary
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          echo ""
          RESPONSE=$(cat /tmp/cloudscan_result.json)

          # Parse risk summary
          SAFE=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['risk_summary'].get('Safe',0))")
          LOW=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['risk_summary'].get('Low',0))")
          MEDIUM=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['risk_summary'].get('Medium',0))")
          HIGH=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['risk_summary'].get('High/Critical',0))")
          FILES=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('files_received',0))")
          NODES=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['graph_stats'].get('num_nodes',0))")
          EDGES=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['graph_stats'].get('num_edges',0))")
          TOTAL=$((SAFE + LOW + MEDIUM + HIGH))

          echo "╔══════════════════════════════════════════════╗"
          echo "║       CloudScan Analysis Complete            ║"
          echo "╠══════════════════════════════════════════════╣"
          printf "║  Files Scanned:    %-4s                      ║\n" "$FILES"
          printf "║  Graph Nodes:      %-4s                      ║\n" "$NODES"
          printf "║  Graph Edges:      %-4s                      ║\n" "$EDGES"
          printf "║  Resources:        %-4s                      ║\n" "$TOTAL"
          echo "║──────────────────────────────────────────────║"
          printf "║  🟢 Safe:          %-4s                      ║\n" "$SAFE"
          printf "║  🟡 Low Risk:      %-4s                      ║\n" "$LOW"
          printf "║  🟠 Medium Risk:   %-4s                      ║\n" "$MEDIUM"
          printf "║  🔴 High/Critical: %-4s                      ║\n" "$HIGH"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          # Print flagged resources
          FLAGGED_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(len(r.get('flagged_resources',[])))")
          if [ "$FLAGGED_COUNT" -gt 0 ]; then
            echo "⚠️  Flagged Resources:"
            echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for res in r.get('flagged_resources', []):
              print(f\"  [{res['risk_label'].upper()}] {res['resource_type']}.{res['node_id']}\")
          "
            echo ""
          fi

          # Print remediation if available
          REMEDIATION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); rem=r.get('remediation',''); print(rem if rem else '')")
          if [ -n "$REMEDIATION" ]; then
            echo "💡 LLM Remediation Suggestions:"
            echo "──────────────────────────────────────────────"
            echo "$REMEDIATION"
            echo "──────────────────────────────────────────────"
            echo ""
          fi

          # Fail the build if high-risk issues are found
          if [ "$HIGH" -gt 0 ]; then
            echo "❌ FAILED - High/Critical risk issues found"
            exit 1
          else
            echo "✅ PASSED - No high-risk issues detected"
          fi

      - name: Stop API Server
        if: always()
        run: |
          if [ -n "$API_PID" ]; then
            kill $API_PID 2>/dev/null || true
          fi

      - name: All Clear
        if: steps.detect_changes.outputs.has_changes == 'false'
        run: |
          echo "✅ No Terraform changes detected. Pipeline passed."
